<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Steam Family Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #090c14; --bg2: #0d1220; --bg3: #111827;
    --surface: #141c2e; --surface2: #1a2540; --border: #1e2d4a;
    --blue: #4facfe; --cyan: #00c8a8; --green: #39ff14;
    --yellow: #ffd60a; --orange: #ff6b35; --pink: #ff2d78;
    --text: #e2e8f0; --muted: #64748b;
    --glow: 0 0 20px rgba(79,172,254,0.3);
  }
  [data-theme="light"] {
    --bg: #f0f4f8; --bg2: #e2e8f0; --bg3: #cbd5e1;
    --surface: #ffffff; --surface2: #f1f5f9; --border: #cbd5e1;
    --blue: #2563eb; --cyan: #0891b2; --green: #16a34a;
    --yellow: #ca8a04; --orange: #ea580c; --pink: #db2777;
    --text: #0f172a; --muted: #64748b;
    --glow: 0 0 20px rgba(37,99,235,0.15);
  }
  [data-theme="light"] body::before {
    background-image: linear-gradient(rgba(37,99,235,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(37,99,235,0.04) 1px,transparent 1px);
  }
  .theme-toggle {
    background:var(--surface); border:1px solid var(--border);
    border-radius:8px; padding:7px 12px; cursor:pointer;
    font-size:16px; transition:.2s; line-height:1; color:var(--text);
  }
  .theme-toggle:hover { border-color:var(--blue); }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Barlow', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content:'';
    position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(79,172,254,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,172,254,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events:none; z-index:0;
  }

  .container { max-width:1400px; margin:0 auto; padding:0 24px; position:relative; z-index:1; }

  /* Header */
  header {
    border-bottom: 1px solid var(--border);
    background: rgba(9,12,20,0.9);
    backdrop-filter: blur(12px);
    position: sticky; top:0; z-index:100;
    padding: 16px 0;
  }
  .header-inner {
    display:flex; align-items:center; gap:16px;
  }
  .logo {
    font-family:'Rajdhani',sans-serif;
    font-size:22px; font-weight:700;
    letter-spacing:3px;
    background: linear-gradient(90deg, var(--blue), var(--cyan));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  }
  .logo span { color: var(--muted); -webkit-text-fill-color: var(--muted); font-weight:400; font-size:13px; letter-spacing:1px; margin-left:8px; }
  .header-status {
    margin-left:auto;
    font-family:'JetBrains Mono', monospace;
    font-size:12px; color:var(--muted);
  }
  .status-dot {
    display:inline-block; width:7px; height:7px;
    border-radius:50%; margin-right:6px;
    background:var(--muted);
  }
  .status-dot.live { background:var(--green); box-shadow:0 0 8px var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* Setup panel */
  #setup-panel {
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    padding: 40px 0;
  }
  .setup-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px;
    width: 100%;
    max-width: 600px;
    box-shadow: 0 0 60px rgba(79,172,254,0.08);
  }
  .setup-title {
    font-family:'Rajdhani',sans-serif;
    font-size:28px; font-weight:700;
    letter-spacing:2px; margin-bottom:6px;
  }
  .setup-sub { color:var(--muted); font-size:14px; margin-bottom:32px; }

  label {
    display:block; font-size:12px; font-weight:500;
    letter-spacing:1px; color:var(--blue);
    text-transform:uppercase; margin-bottom:8px;
  }
  input[type=text], input[type=password] {
    width:100%; background:var(--bg2);
    border:1px solid var(--border); border-radius:8px;
    padding:11px 14px; color:var(--text);
    font-family:'JetBrains Mono',monospace; font-size:13px;
    outline:none; transition:.2s;
    margin-bottom:20px;
  }
  input:focus { border-color:var(--blue); box-shadow:0 0 0 3px rgba(79,172,254,0.1); }

  .accounts-grid { display:flex; flex-direction:column; gap:10px; margin-bottom:20px; }
  .account-row {
    display:flex; gap:10px; align-items:center;
  }
  .account-row input { margin-bottom:0; flex:1; }
  .account-row input:first-child { max-width:150px; }
  .btn-remove {
    background:none; border:1px solid var(--border); border-radius:6px;
    color:var(--muted); cursor:pointer; padding:10px 12px; font-size:14px;
    transition:.2s; flex-shrink:0;
  }
  .btn-remove:hover { border-color:var(--pink); color:var(--pink); }

  .btn-add {
    background:none; border:1px dashed var(--border); border-radius:8px;
    color:var(--muted); cursor:pointer; padding:10px; font-size:13px;
    width:100%; transition:.2s; margin-bottom:28px;
  }
  .btn-add:hover { border-color:var(--blue); color:var(--blue); }

  .btn-primary {
    background: linear-gradient(135deg, var(--blue), var(--cyan));
    border:none; border-radius:8px;
    color:#000; font-family:'Rajdhani',sans-serif;
    font-size:16px; font-weight:700; letter-spacing:2px;
    padding:13px 32px; cursor:pointer; width:100%;
    transition:.2s; text-transform:uppercase;
  }
  .btn-primary:hover { opacity:.85; transform:translateY(-1px); }
  .btn-primary:disabled { opacity:.4; cursor:not-allowed; transform:none; }

  /* Loading */
  #loading-panel {
    min-height:80vh; display:none; align-items:center; justify-content:center;
    flex-direction:column; gap:20px;
  }
  .loader-ring {
    width:60px; height:60px; border-radius:50%;
    border:3px solid var(--border);
    border-top-color:var(--blue);
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to{transform:rotate(360deg)} }
  .loader-text {
    font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--muted);
    text-align:center;
  }

  /* Dashboard */
  #dashboard { display:none; padding:32px 0 60px; }

  /* Stats bar */
  .stats-bar {
    display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
    gap:12px; margin-bottom:32px;
  }
  .stat-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:10px; padding:18px 20px;
    transition:.2s;
  }
  .stat-card:hover { border-color:var(--blue); transform:translateY(-2px); }
  .stat-label {
    font-size:11px; text-transform:uppercase; letter-spacing:1px;
    color:var(--muted); margin-bottom:6px;
  }
  .stat-value {
    font-family:'Rajdhani',sans-serif; font-size:28px; font-weight:700;
    background: linear-gradient(90deg, var(--blue), var(--cyan));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  }

  /* Tabs */
  .tabs {
    display:flex; gap:4px; margin-bottom:28px;
    border-bottom:1px solid var(--border); padding-bottom:0;
    overflow-x:auto;
  }
  .tab {
    font-family:'Rajdhani',sans-serif; font-size:14px; font-weight:600;
    letter-spacing:1px; text-transform:uppercase;
    padding:10px 20px; cursor:pointer;
    border:none; background:none; color:var(--muted);
    border-bottom:2px solid transparent;
    transition:.2s; white-space:nowrap;
  }
  .tab.active { color:var(--blue); border-bottom-color:var(--blue); }
  .tab:hover:not(.active) { color:var(--text); }

  .tab-content { display:none; }
  .tab-content.active { display:block; animation: fadeIn .3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

  /* Section title */
  .section-title {
    font-family:'Rajdhani',sans-serif; font-size:18px; font-weight:700;
    letter-spacing:2px; text-transform:uppercase; margin-bottom:16px;
    color:var(--blue);
  }

  /* Ranking bars */
  .ranking-list { display:flex; flex-direction:column; gap:10px; }
  .rank-item {
    background:var(--surface); border:1px solid var(--border);
    border-radius:10px; padding:14px 18px;
    display:flex; align-items:center; gap:14px;
    transition:.2s;
  }
  .rank-item:hover { border-color:var(--border); background:var(--surface2); }
  .rank-num {
    font-family:'Rajdhani',sans-serif; font-size:20px; font-weight:700;
    color:var(--muted); min-width:28px;
  }
  .rank-num.gold { color:var(--yellow); }
  .rank-num.silver { color:#94a3b8; }
  .rank-num.bronze { color:var(--orange); }
  .rank-info { flex:1; }
  .rank-name { font-size:15px; font-weight:500; margin-bottom:4px; }
  .rank-bar-wrap { height:4px; background:var(--bg); border-radius:4px; overflow:hidden; }
  .rank-bar {
    height:100%; border-radius:4px;
    background:linear-gradient(90deg,var(--blue),var(--cyan));
    transition:width 1s cubic-bezier(.4,0,.2,1);
  }
  .rank-val {
    font-family:'JetBrains Mono',monospace; font-size:13px;
    color:var(--cyan); min-width:70px; text-align:right;
  }

  /* Account cards */
  .accounts-grid-display {
    display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
    gap:16px;
  }
  .account-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:12px; padding:20px;
    transition:.2s; position:relative; overflow:hidden;
  }
  .account-card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:3px;
    background:linear-gradient(90deg,var(--blue),var(--cyan));
  }
  .account-card:hover { transform:translateY(-3px); box-shadow:var(--glow); }
  .account-avatar {
    width:52px; height:52px; border-radius:8px;
    background:var(--surface2); margin-bottom:12px;
    border:2px solid var(--border); overflow:hidden;
  }
  .account-avatar img { width:100%; height:100%; object-fit:cover; }
  .account-avatar-placeholder {
    width:100%; height:100%; display:flex; align-items:center; justify-content:center;
    font-family:'Rajdhani',sans-serif; font-size:22px; font-weight:700; color:var(--blue);
  }
  .account-card-name { font-family:'Rajdhani',sans-serif; font-size:18px; font-weight:700; margin-bottom:12px; }
  .account-stats { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .acstat { background:var(--bg2); border-radius:6px; padding:10px 12px; }
  .acstat-label { font-size:10px; letter-spacing:1px; text-transform:uppercase; color:var(--muted); margin-bottom:4px; }
  .acstat-val { font-family:'Rajdhani',sans-serif; font-size:18px; font-weight:700; color:var(--cyan); }

  /* Game list */
  .game-table-wrap { overflow-x:auto; }
  .game-table {
    width:100%; border-collapse:collapse;
    font-size:14px; table-layout:fixed;
  }
  .game-table th {
    text-align:left; padding:10px 14px;
    font-family:'Rajdhani',sans-serif; font-size:12px; font-weight:600;
    letter-spacing:1.5px; text-transform:uppercase; color:var(--muted);
    border-bottom:1px solid var(--border); cursor:pointer; white-space:nowrap;
  }
  .game-table th:nth-child(1) { width:48px; }
  .game-table th:nth-child(2) { width:35%; }
  .game-table th:nth-child(4) { width:130px; }
  .game-table th:hover { color:var(--blue); }
  .game-table td {
    padding:10px 14px; border-bottom:1px solid rgba(30,45,74,0.5);
    vertical-align:middle; overflow:hidden;
  }
  .game-table tr:hover td { background:var(--surface2); }
  .game-img {
    width:80px; height:30px; border-radius:4px; flex-shrink:0;
    object-fit:cover; object-position:center; background:var(--surface2);
  }





  .badge {
    font-size:10px; padding:2px 7px; border-radius:4px;
    font-family:'JetBrains Mono',monospace; font-weight:500;
  }
  .badge-unique { background:rgba(57,255,20,0.15); color:var(--green); border:1px solid rgba(57,255,20,0.3); }
  .badge-shared { background:rgba(79,172,254,0.15); color:var(--blue); border:1px solid rgba(79,172,254,0.3); }

  /* Search */
  .search-bar {
    display:flex; gap:12px; margin-bottom:20px; align-items:center;
  }
  .search-bar input {
    flex:1; margin-bottom:0;
  }
  .filter-btn {
    background:var(--surface); border:1px solid var(--border);
    border-radius:8px; padding:10px 16px; color:var(--muted);
    font-family:'Rajdhani',sans-serif; font-size:13px; font-weight:600;
    letter-spacing:1px; cursor:pointer; white-space:nowrap; transition:.2s;
  }
  .filter-btn.active { border-color:var(--blue); color:var(--blue); background:rgba(79,172,254,0.08); }

  /* Common games */
  .common-section { margin-bottom:28px; }
  .common-pills { display:flex; flex-wrap:wrap; gap:8px; }
  .pill {
    background:var(--surface); border:1px solid var(--border);
    border-radius:20px; padding:5px 14px;
    font-size:13px; display:flex; align-items:center; gap:8px;
    transition:.2s;
  }
  .pill:hover { border-color:var(--blue); }
  .pill-count {
    background:linear-gradient(135deg,var(--blue),var(--cyan));
    color:#000; font-size:10px; font-weight:700;
    padding:1px 6px; border-radius:10px;
  }

  /* Achievements */
  .achiev-grid {
    display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:14px;
  }
  .achiev-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:10px; padding:16px;
    transition:.2s;
  }
  .achiev-card:hover { border-color:var(--yellow); }
  .achiev-header { display:flex; align-items:center; gap:12px; margin-bottom:10px; }
  .achiev-icon { font-size:24px; }
  .achiev-account { font-family:'Rajdhani',sans-serif; font-size:16px; font-weight:700; }
  .achiev-game { font-size:12px; color:var(--muted); }
  .achiev-bar-wrap { height:6px; background:var(--bg); border-radius:4px; margin:8px 0 4px; }
  .achiev-bar {
    height:100%; border-radius:4px;
    background:linear-gradient(90deg,var(--yellow),var(--orange));
    transition:width 1s ease;
  }
  .achiev-pct { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--yellow); }

  /* Error */
  .error-box {
    background:rgba(255,45,120,0.08); border:1px solid rgba(255,45,120,0.3);
    border-radius:8px; padding:14px 18px; color:var(--pink);
    font-size:13px; margin-bottom:16px; display:none;
  }

  /* Pagination */
  .pagination { display:flex; gap:8px; justify-content:center; margin-top:20px; }
  .page-btn {
    background:var(--surface); border:1px solid var(--border);
    border-radius:6px; padding:7px 13px; color:var(--muted);
    font-family:'JetBrains Mono',monospace; font-size:12px;
    cursor:pointer; transition:.2s;
  }
  .page-btn.active { border-color:var(--blue); color:var(--blue); }
  .page-btn:hover:not(.active) { color:var(--text); }

  /* Reset btn */
  .btn-reset {
    background:none; border:1px solid var(--border);
    border-radius:8px; padding:8px 16px;
    color:var(--muted); font-size:13px; cursor:pointer;
    transition:.2s; margin-left:auto;
  }
  .btn-reset:hover { border-color:var(--pink); color:var(--pink); }

  .tag-unique { color:var(--green); font-size:11px; margin-left:6px; }
  .tag-shared { color:var(--blue); font-size:11px; margin-left:6px; }

  .empty { text-align:center; padding:40px; color:var(--muted); font-size:14px; }

  @media(max-width:600px){
    .setup-card { padding:24px; }
    .stats-bar { grid-template-columns:1fr 1fr; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="container">
    <div class="header-inner">
      <div class="logo">STEAM<span>FAMILY HUB</span></div>
      <div class="header-status" id="header-status">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text">Aguardando configuração</span>
      </div>
      <button class="theme-toggle" onclick="toggleTheme()" title="Alternar tema">🌙</button>
      <button class="btn-reset" id="btn-reset" style="display:none" onclick="resetDashboard()">⟵ Reconfigurar</button>
    </div>
  </div>
</header>

<!-- SETUP -->
<div id="setup-panel">
  <div class="container">
    <div class="setup-card">
      <div class="setup-title">⚙ CONFIGURAÇÃO</div>
      <div class="setup-sub">Insira sua API Key e os perfis Steam (URL do perfil ou SteamID64).</div>

      <div class="error-box" id="error-box"></div>

      <label>Steam API Key</label>
      <input type="password" id="api-key" placeholder="Ex: 339E5FDF49A1D9E0EC5C52E277833E0C">

      <label>Contas (apelido + SteamID64)</label>
      <div class="accounts-grid" id="accounts-grid">
        <div class="account-row">
          <input type="text" placeholder="Apelido" class="acc-name" value="Lírio">
          <input type="text" placeholder="URL ou SteamID64" class="acc-id" value="76561198158302059">
          <button class="btn-remove" onclick="removeRow(this)">✕</button>
        </div>
        <div class="account-row">
          <input type="text" placeholder="Apelido" class="acc-name" value="Kiri">
          <input type="text" placeholder="URL ou SteamID64" class="acc-id" value="76561199011715965">
          <button class="btn-remove" onclick="removeRow(this)">✕</button>
        </div>
        <div class="account-row">
          <input type="text" placeholder="Apelido" class="acc-name" value="Dudu">
          <input type="text" placeholder="URL ou SteamID64" class="acc-id" value="76561198833523657">
          <button class="btn-remove" onclick="removeRow(this)">✕</button>
        </div>
        <div class="account-row">
          <input type="text" placeholder="Apelido" class="acc-name" value="Bambo">
          <input type="text" placeholder="URL ou SteamID64" class="acc-id" value="76561199148095723">
          <button class="btn-remove" onclick="removeRow(this)">✕</button>
        </div>
        <div class="account-row">
          <input type="text" placeholder="Apelido" class="acc-name" value="Nino">
          <input type="text" placeholder="URL ou SteamID64" class="acc-id" value="76561198394798327">
          <button class="btn-remove" onclick="removeRow(this)">✕</button>
        </div>
        <div class="account-row">
          <input type="text" placeholder="Apelido" class="acc-name" value="Carrot">
          <input type="text" placeholder="URL ou SteamID64" class="acc-id" value="76561199001083134">
          <button class="btn-remove" onclick="removeRow(this)">✕</button>
        </div>
      </div>
      <button class="btn-add" onclick="addRow()">+ Adicionar conta</button>

      <button class="btn-primary" id="btn-load" onclick="loadData()">CARREGAR DADOS</button>
    </div>
  </div>
</div>

<!-- LOADING -->
<div id="loading-panel">
  <div class="loader-ring"></div>
  <div class="loader-text" id="loader-text">Conectando à Steam API...</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="container">

    <!-- Stats bar -->
    <div class="stats-bar" id="stats-bar"></div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('visao-geral')">Visão Geral</button>
      <button class="tab" onclick="switchTab('biblioteca')">Biblioteca</button>
      <button class="tab" onclick="switchTab('em-comum')">Em Comum</button>
      <button class="tab" onclick="switchTab('unicos')">Únicos</button>
    </div>

    <!-- VISÃO GERAL -->
    <div class="tab-content active" id="tab-visao-geral">
      <div class="section-title">Contas</div>
      <div class="accounts-grid-display" id="accounts-display"></div>

      <div style="margin-top:32px; display:grid; grid-template-columns:1fr 1fr; gap:24px;">
        <div>
          <div class="section-title">🏆 Ranking por Jogos</div>
          <div class="ranking-list" id="rank-jogos"></div>
        </div>
        <div>
          <div class="section-title">⏱ Ranking por Horas</div>
          <div class="ranking-list" id="rank-horas"></div>
        </div>
      </div>
    </div>

    <!-- BIBLIOTECA -->
    <div class="tab-content" id="tab-biblioteca">
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="Buscar jogo..." oninput="renderBiblioteca()">
        <button class="filter-btn active" id="filter-all" onclick="setFilter('all')">Todos</button>
        <button class="filter-btn" id="filter-unique" onclick="setFilter('unique')">Únicos</button>
        <button class="filter-btn" id="filter-shared" onclick="setFilter('shared')">Compartilhados</button>
      </div>
      <div class="game-table-wrap">
        <table class="game-table">
          <thead>
            <tr>
              <th onclick="sortBy('img')">#</th>
              <th onclick="sortBy('name')">Jogo ↕</th>
              <th onclick="sortBy('owners')">Donos ↕</th>
              <th onclick="sortBy('hours')">Horas Totais ↕</th>
            </tr>
          </thead>
          <tbody id="game-table-body"></tbody>
        </table>
      </div>
      <div class="pagination" id="pagination"></div>
    </div>

    <!-- EM COMUM -->
    <div class="tab-content" id="tab-em-comum">
      <div class="section-title">Jogos que todas as contas têm</div>
      <div class="common-pills" id="common-all" style="margin-bottom:28px;"></div>

      <div class="section-title">Jogos em comum por par de contas</div>
      <div id="common-pairs"></div>
    </div>

    <!-- ÚNICOS -->
    <div class="tab-content" id="tab-unicos">
      <div id="unicos-content"></div>
    </div>



  </div>
</div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
let API_KEY = '';
let allData = {}; // { name: [games] }
let allGames = {}; // { appid: { name, totalHours, owners:[name], img } }
let sortKey = 'hours';
let sortAsc = false;
let currentFilter = 'all';
let currentPage = 1;
const PAGE_SIZE = 50;

// ─── Setup helpers ────────────────────────────────────────────────────────────
function addRow() {
  const grid = document.getElementById('accounts-grid');
  const row = document.createElement('div');
  row.className = 'account-row';
  row.innerHTML = `
    <input type="text" placeholder="Apelido" class="acc-name">
    <input type="text" placeholder="URL ou SteamID64" class="acc-id">
    <button class="btn-remove" onclick="removeRow(this)">✕</button>`;
  grid.appendChild(row);
}
function removeRow(btn) {
  const rows = document.querySelectorAll('.account-row');
  if (rows.length <= 1) return;
  btn.closest('.account-row').remove();
}

function showError(msg) {
  const box = document.getElementById('error-box');
  box.textContent = msg; box.style.display='block';
}

// ─── Load data ────────────────────────────────────────────────────────────────
async function loadData() {
  document.getElementById('error-box').style.display='none';
  API_KEY = document.getElementById('api-key').value.trim();
  if (!API_KEY) return showError('Insira a API Key da Steam.');

  const rows = document.querySelectorAll('.account-row');
  const accounts = [];
  for (const row of rows) {
    const name = row.querySelector('.acc-name').value.trim();
    const id   = row.querySelector('.acc-id').value.trim();
    if (name && id) accounts.push({name, id});
  }
  if (accounts.length === 0) return showError('Adicione pelo menos uma conta.');

  document.getElementById('setup-panel').style.display='none';
  const loading = document.getElementById('loading-panel');
  loading.style.display='flex';
  document.getElementById('btn-load').disabled = true;

  const setLoader = t => document.getElementById('loader-text').textContent = t;

  allData = {}; allGames = {};

  // Resolve vanity URL or steam link to SteamID64
  async function resolveId(input) {
    input = input.trim();
    // Already a 64-bit ID
    if (/^7656119\d{10}$/.test(input)) return input;
    // Extract vanity from URL: steamcommunity.com/id/VANITY or /profiles/ID
    let vanity = input;
    const mProfile = input.match(/\/profiles\/(\d+)/);
    if (mProfile) return mProfile[1];
    const mId = input.match(/\/id\/([^\/\?]+)/);
    if (mId) vanity = mId[1];
    // Strip trailing slash/spaces
    vanity = vanity.replace(/\/$/, '').trim();
    // Call ResolveVanityURL
    const resolveUrl = `https://api.steampowered.com/ISteamWebAPIUtil/ResolveVanityURL/v1/?key=${API_KEY}&vanityurl=${encodeURIComponent(vanity)}&format=json`;
    const data = await fetchWithFallback(resolveUrl);
    if (data?.response?.success === 1) return data.response.steamid;
    return null;
  }

  const PROXIES = [
    url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
    url => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
    url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
  ];

  async function fetchWithFallback(url) {
    // 1) Tenta direto
    try {
      const r = await fetch(url);
      if (r.ok) {
        const d = await r.json();
        const games = d.response?.games;
        // Só aceita se vier com dados (evita falso-positivo de CORS vazio)
        if (Array.isArray(games) && games.length > 0) return d;
        // Se veio vazio pode ser CORS ou conta sem jogos — tenta proxy antes de desistir
      }
    } catch(e) { /* CORS, tenta proxy */ }

    // 2) Tenta cada proxy em sequência
    for (const makeProxy of PROXIES) {
      try {
        const r = await fetch(makeProxy(url));
        if (!r.ok) continue;
        const raw = await r.json();
        // allorigins.win encapsula em { contents: "..." }
        const inner = raw.contents ? JSON.parse(raw.contents) : raw;
        if (inner.response !== undefined) return inner;
      } catch(e) { /* tenta próximo */ }
    }
    return null;
  }

  for (const acc of accounts) {
    setLoader(`Resolvendo ${acc.name}...`);
    let steamid64 = await resolveId(acc.id);
    if (!steamid64) { console.warn(`Não foi possível resolver ${acc.name}`); allData[acc.name]=[]; continue; }
    window._steamids[acc.name] = steamid64;
    setLoader(`Carregando biblioteca de ${acc.name}...`);
    try {
      const url = `https://api.steampowered.com/IPlayerService/GetOwnedGames/v1/?key=${API_KEY}&steamid=${steamid64}&include_appinfo=1&include_played_free_games=1&skip_unvetted_apps=false&format=json`;

      const data = await fetchWithFallback(url);
      const games = data?.response?.games || [];

      allData[acc.name] = games;
      for (const g of games) {
        if (!allGames[g.appid]) {
          allGames[g.appid] = {
            name: g.name || `App ${g.appid}`,
            appid: g.appid,
            totalHours: 0,
            owners: [],
            img: `https://cdn.cloudflare.steamstatic.com/steam/apps/${g.appid}/capsule_sm_120.jpg`,
          };
        }
        allGames[g.appid].totalHours += (g.playtime_forever || 0) / 60;
        allGames[g.appid].owners.push(acc.name);
      }
    } catch(err) {
      console.error(err);
      allData[acc.name] = [];
    }
  }

  loading.style.display='none';
  buildDashboard();
}

// ─── Build Dashboard ──────────────────────────────────────────────────────────
function buildDashboard() {
  document.getElementById('dashboard').style.display='block';
  document.getElementById('btn-reset').style.display='block';
  const dot = document.getElementById('status-dot');
  dot.classList.add('live');
  document.getElementById('status-text').textContent = `${Object.keys(allData).length} contas carregadas`;

  buildStatsBar();
  buildVisaoGeral();
  renderBiblioteca();
  buildEmComum();
  buildUnicos();
}

function buildStatsBar() {
  const names = Object.keys(allData);
  const totalGamesUniq = Object.keys(allGames).length;
  const totalHours = Object.values(allGames).reduce((s,g)=>s+g.totalHours,0);
  const mostGames = names.reduce((a,b)=>allData[a].length>=allData[b].length?a:b, names[0]);
  const mostHours = names.reduce((a,b)=>{
    const ha = allData[a].reduce((s,g)=>s+g.playtime_forever/60,0);
    const hb = allData[b].reduce((s,g)=>s+g.playtime_forever/60,0);
    return ha>=hb?a:b;
  }, names[0]);

  document.getElementById('stats-bar').innerHTML = `
    <div class="stat-card"><div class="stat-label">Contas</div><div class="stat-value">${names.length}</div></div>
    <div class="stat-card"><div class="stat-label">Jogos Únicos</div><div class="stat-value">${totalGamesUniq.toLocaleString()}</div></div>
    <div class="stat-card"><div class="stat-label">Horas Totais</div><div class="stat-value">${Math.round(totalHours).toLocaleString()}h</div></div>
    <div class="stat-card"><div class="stat-label">Mais Jogos</div><div class="stat-value" style="font-size:18px">${mostGames}</div></div>
    <div class="stat-card"><div class="stat-label">Mais Horas</div><div class="stat-value" style="font-size:18px">${mostHours}</div></div>
  `;
}

function buildVisaoGeral() {
  const names = Object.keys(allData);

  // Fetch avatars
  const colors = ['#4facfe','#00c8a8','#39ff14','#ffd60a','#ff6b35','#ff2d78'];
  names.forEach(name => {
    const sid = window._steamids?.[name];
    if (!sid) return;
    const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(`https://api.steampowered.com/ISteamUser/GetPlayerSummaries/v2/?key=${API_KEY}&steamids=${sid}&format=json`)}`;
    fetch(proxyUrl).then(r=>r.json()).then(d=>{
      const player = d?.response?.players?.[0];
      if (!player) return;
      const avatarEl = document.getElementById('avatar-'+name.replace(/\W/g,'_'));
      if (avatarEl) {
        avatarEl.innerHTML = `<img src="${player.avatarfull}" style="width:100%;height:100%;object-fit:cover;border-radius:6px">`;
      }
    }).catch(()=>{});
  });

  // Account cards
  document.getElementById('accounts-display').innerHTML = names.map((name,i) => {
    const games = allData[name];
    const hours = Math.round(games.reduce((s,g)=>s+g.playtime_forever/60,0));
    const avgHours = games.length ? (hours/games.length).toFixed(1) : 0;
    const initials = name.slice(0,2).toUpperCase();
    return `
      <div class="account-card">
        <div class="account-avatar" id="avatar-${name.replace(/\W/g,'_')}">
          <div class="account-avatar-placeholder" style="color:${colors[i%colors.length]}">${initials}</div>
        </div>
        <div class="account-card-name">${name}</div>
        <div class="account-stats">
          <div class="acstat"><div class="acstat-label">Jogos</div><div class="acstat-val">${games.length.toLocaleString()}</div></div>
          <div class="acstat"><div class="acstat-label">Horas</div><div class="acstat-val">${hours.toLocaleString()}h</div></div>
          <div class="acstat"><div class="acstat-label">Média/jogo</div><div class="acstat-val">${avgHours}h</div></div>
          <div class="acstat"><div class="acstat-label">Únicos</div><div class="acstat-val">${games.filter(g=>allGames[g.appid]?.owners.length===1).length}</div></div>
        </div>
      </div>`;
  }).join('');

  // Rankings
  const byGames = [...names].sort((a,b)=>allData[b].length-allData[a].length);
  const byHours = [...names].sort((a,b)=>{
    const ha = allData[a].reduce((s,g)=>s+g.playtime_forever/60,0);
    const hb = allData[b].reduce((s,g)=>s+g.playtime_forever/60,0);
    return hb-ha;
  });
  const maxG = allData[byGames[0]].length;
  const maxH = allData[byHours[0]].reduce((s,g)=>s+g.playtime_forever/60,0);

  function rankItem(name, val, max, label, idx) {
    const cls = idx===0?'gold':idx===1?'silver':idx===2?'bronze':'';
    const pct = Math.round((val/max)*100);
    return `<div class="rank-item">
      <div class="rank-num ${cls}">${idx+1}</div>
      <div class="rank-info">
        <div class="rank-name">${name}</div>
        <div class="rank-bar-wrap"><div class="rank-bar" style="width:${pct}%"></div></div>
      </div>
      <div class="rank-val">${label}</div>
    </div>`;
  }

  document.getElementById('rank-jogos').innerHTML = byGames.map((n,i)=>
    rankItem(n, allData[n].length, maxG, allData[n].length.toLocaleString(), i)).join('');
  document.getElementById('rank-horas').innerHTML = byHours.map((n,i)=>{
    const h = Math.round(allData[n].reduce((s,g)=>s+g.playtime_forever/60,0));
    return rankItem(n, h, maxH, h.toLocaleString()+'h', i);
  }).join('');
}

// ─── Biblioteca ───────────────────────────────────────────────────────────────
function setFilter(f) {
  currentFilter = f; currentPage = 1;
  ['all','unique','shared'].forEach(x=>{
    document.getElementById('filter-'+x).classList.toggle('active',x===f);
  });
  renderBiblioteca();
}

function sortBy(key) {
  if (sortKey===key) sortAsc=!sortAsc; else { sortKey=key; sortAsc=false; }
  currentPage=1; renderBiblioteca();
}

function renderBiblioteca() {
  const q = document.getElementById('search-input').value.toLowerCase();
  let games = Object.values(allGames);

  if (q) games = games.filter(g=>g.name.toLowerCase().includes(q));
  if (currentFilter==='unique') games = games.filter(g=>g.owners.length===1);
  if (currentFilter==='shared') games = games.filter(g=>g.owners.length>1);

  games.sort((a,b)=>{
    let va,vb;
    if (sortKey==='name') { va=a.name; vb=b.name; return sortAsc?va.localeCompare(vb):vb.localeCompare(va); }
    if (sortKey==='hours') { va=a.totalHours; vb=b.totalHours; }
    if (sortKey==='owners') { va=a.owners.length; vb=b.owners.length; }
    return sortAsc?va-vb:vb-va;
  });

  const total = games.length;
  const pages = Math.ceil(total/PAGE_SIZE);
  if (currentPage>pages) currentPage=1;
  const slice = games.slice((currentPage-1)*PAGE_SIZE, currentPage*PAGE_SIZE);

  const tbody = document.getElementById('game-table-body');
  tbody.innerHTML = slice.map((g,i)=>{
    const idx = (currentPage-1)*PAGE_SIZE+i+1;
    const img = g.img ? `<img class="game-img" src="${g.img}" onerror="this.style.display='none'">` : '—';
    const badge = g.owners.length===1
      ? `<span class="badge badge-unique">único</span>`
      : `<span class="badge badge-shared">${g.owners.length} donos</span>`;
    const ownerList = g.owners.join(', ');
    const hrs = g.totalHours.toFixed(1);
    return `<tr>
      <td style="color:var(--muted);font-size:12px">${idx}</td>
      <td><div style="display:flex;align-items:center;gap:10px">${img}<span>${g.name}</span></div></td>
      <td><div class="owner-badges">${badge}<span style="font-size:12px;color:var(--muted);margin-left:4px">${ownerList}</span></div></td>
      <td style="font-family:'JetBrains Mono',monospace;color:var(--cyan)">${hrs}h</td>
    </tr>`;
  }).join('');

  // Pagination
  const pag = document.getElementById('pagination');
  if (pages<=1) { pag.innerHTML=''; return; }
  let html = '';
  for (let p=1;p<=Math.min(pages,10);p++) {
    html+=`<button class="page-btn${p===currentPage?' active':''}" onclick="goPage(${p})">${p}</button>`;
  }
  if (pages>10) html+=`<span style="color:var(--muted);font-size:12px;padding:0 8px">... ${pages} páginas</span>`;
  pag.innerHTML=html;
}

function goPage(p) { currentPage=p; renderBiblioteca(); window.scrollTo(0,300); }

// ─── Em Comum ─────────────────────────────────────────────────────────────────
function buildEmComum() {
  const names = Object.keys(allData);
  // All accounts
  const allCommon = Object.values(allGames).filter(g=>g.owners.length===names.length);
  document.getElementById('common-all').innerHTML = allCommon.length
    ? allCommon.sort((a,b)=>a.name.localeCompare(b.name)).map(g=>`<div class="pill">${g.name}<span class="pill-count">${names.length}</span></div>`).join('')
    : `<div class="empty">Nenhum jogo em comum entre todas as contas.</div>`;

  // Pairs
  let pairsHtml = '';
  for (let i=0;i<names.length;i++) {
    for (let j=i+1;j<names.length;j++) {
      const a=names[i], b=names[j];
      const common = Object.values(allGames).filter(g=>g.owners.includes(a)&&g.owners.includes(b));
      pairsHtml+=`<div class="common-section">
        <div style="font-size:13px;font-weight:600;margin-bottom:10px;color:var(--text)">
          ${a} <span style="color:var(--muted)">×</span> ${b}
          <span style="color:var(--muted);font-weight:400;margin-left:8px">(${common.length} jogos)</span>
        </div>
        <div class="common-pills">${common.length
          ? common.sort((a,b)=>a.name.localeCompare(b.name)).slice(0,40).map(g=>`<div class="pill">${g.name}</div>`).join('')+(common.length>40?`<div class="pill pill-more" style="color:var(--blue);cursor:pointer;border-color:var(--blue)" data-all='${JSON.stringify(common.sort((a,b)=>a.name.localeCompare(b.name)).slice(40).map(g=>g.name))}' onclick="expandCommon(this)">+${common.length-40} mais</div>`:'')
          : '<span style="color:var(--muted);font-size:13px">Nenhum em comum</span>'}
        </div>
      </div>`;
    }
  }
  document.getElementById('common-pairs').innerHTML = pairsHtml;
}

// ─── Únicos ───────────────────────────────────────────────────────────────────
function buildUnicos() {
  const names = Object.keys(allData);
  let html = '';
  for (const name of names) {
    const unique = Object.values(allGames).filter(g=>g.owners.length===1&&g.owners[0]===name);
    unique.sort((a,b)=>b.totalHours-a.totalHours);
    html+=`<div style="margin-bottom:28px">
      <div class="section-title">${name} — ${unique.length} jogos exclusivos</div>
      <div class="common-pills">
        ${unique.slice(0,60).map(g=>`
          <div class="pill">
            ${g.name}
            <span class="pill-count">${g.totalHours.toFixed(0)}h</span>
          </div>`).join('')}
        ${unique.length>60?`<div class="pill pill-more" style="color:var(--blue);cursor:pointer;border-color:var(--blue)" onclick="expandUnicos(this,'${name.replace(/'/g,"\\'")}')">+${unique.length-60} mais</div>`:''}
      </div>
    </div>`;
  }
  document.getElementById('unicos-content').innerHTML = html;
}

function expandUnicos(btn, name) {
  const unique = Object.values(allGames).filter(g=>g.owners.length===1&&g.owners[0]===name);
  unique.sort((a,b)=>b.totalHours-a.totalHours);
  const container = btn.closest('.common-pills');
  const extra = unique.slice(60).map(g=>`
    <div class="pill">
      ${g.name}
      <span class="pill-count">${g.totalHours.toFixed(0)}h</span>
    </div>`).join('');
  btn.insertAdjacentHTML('beforebegin', extra);
  btn.remove();
}

function expandCommon(btn) {
  const names = JSON.parse(btn.dataset.all);
  const extra = names.map(n=>`<div class="pill">${n}</div>`).join('');
  btn.insertAdjacentHTML('beforebegin', extra);
  btn.remove();
}





// ─── Tabs ─────────────────────────────────────────────────────────────────────
function switchTab(id) {
  document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  event.target.classList.add('active');
}

function resetDashboard() {
  document.getElementById('dashboard').style.display='none';
  document.getElementById('setup-panel').style.display='flex';
  document.getElementById('btn-reset').style.display='none';
  document.getElementById('btn-load').disabled=false;
  document.getElementById('status-dot').classList.remove('live');
  document.getElementById('status-text').textContent='Aguardando configuração';
  allData={}; allGames={};
}

// ─── Theme ────────────────────────────────────────────────────────────────────
function toggleTheme() {
  const html = document.documentElement;
  const isLight = html.getAttribute('data-theme') === 'light';
  html.setAttribute('data-theme', isLight ? 'dark' : 'light');
  document.querySelector('.theme-toggle').textContent = isLight ? '🌙' : '☀️';
}

// Store steamids for achievement lookup
const origLoad = loadData;
window._steamids = {};

// Patch loadData to capture steamids
const _origLoad = loadData;
window.loadData = async function() {
  const rows = document.querySelectorAll('.account-row');
  for (const row of rows) {
    const name = row.querySelector('.acc-name').value.trim();
    const id   = row.querySelector('.acc-id').value.trim();
    if (name && id) window._steamids[name] = id;
  }
  await _origLoad();
}
// reassign
document.getElementById('btn-load').onclick = window.loadData;
</script>
</body>
</html>
