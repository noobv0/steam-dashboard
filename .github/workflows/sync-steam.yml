name: Sincronizar Dados da Steam

on:
  schedule:
    - cron: '0 6 * * *'  # Roda todo dia às 03:00 AM (Brasília)
  workflow_dispatch:     # Botão manual

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install
        run: npm install

      - name: Sync
        run: npm run sync-steam
        env:
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/steam_cache.json
          # Só faz commit se houver mudanças
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: atualizar cache da Steam [skip ci]" && git pull origin main --rebase && git push origin main)
