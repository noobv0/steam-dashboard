name: Sincronizar Dados da Steam

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install
        run: npm install

      - name: Sync Steam Data
        run: npm run sync-steam
        env:
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Limpa mudanças automáticas em arquivos de sistema para não travar o pull
          git checkout package-lock.json
          
          git add src/data/steam_cache.json
          if git diff --staged --quiet; then
            echo "Nenhuma mudança detectada no cache."
          else
            git commit -m "chore: atualizar cache da Steam [skip ci]"
            # Tenta sincronizar com o servidor antes de enviar
            git pull origin main --rebase
            git push origin main
          fi
